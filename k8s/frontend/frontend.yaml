# React SPA Frontend (built & served by nginx:alpine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: blackiefi
  labels: &fe-labels
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels: *fe-labels
    spec:
      containers:
        - name: frontend
          image: ${REGISTRY}/blackiefi-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: blackiefi
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
