# Persistent Volume Claims for all stateful services.
# Adjust storageClassName to match your home-lab provisioner
# (e.g. local-path, nfs-client, longhorn, openebs-hostpath).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: blackiefi
  labels:
    app.kubernetes.io/component: mongo
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: blackiefi
  labels:
    app.kubernetes.io/component: redis
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
