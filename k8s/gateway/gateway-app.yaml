# Node.js API Gateway — JWT validation, routing, correlation IDs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-app
  namespace: blackiefi
  labels: &gw-labels
    app: gateway-app
    app.kubernetes.io/name: gateway-app
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-app
  template:
    metadata:
      labels: *gw-labels
    spec:
      containers:
        - name: gateway-app
          image: ${REGISTRY}/blackiefi-gateway-app:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: GATEWAY_APP_PORT
              value: "8000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: AUTH_SERVICE_URL
              value: "http://auth.blackiefi.svc.cluster.local:8001"
            - name: CORE_SERVICE_URL
              value: "http://core.blackiefi.svc.cluster.local:8002"
            - name: ENTITY_SERVICE_URL
              value: "http://entity.blackiefi.svc.cluster.local:8003"
            - name: PORTFOLIO_SERVICE_URL
              value: "http://portfolio.blackiefi.svc.cluster.local:8004"
            - name: ASSETS_SERVICE_URL
              value: "http://assets.blackiefi.svc.cluster.local:8005"
            - name: REDIS_URL
              value: "redis://redis.blackiefi.svc.cluster.local:6379"
            - name: CORS_ORIGINS
              value: "http://localhost:8080,https://blackiefi.local"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-app
  namespace: blackiefi
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: gateway-app
