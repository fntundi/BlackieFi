apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: blackiefi
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        app.kubernetes.io/name: mongo
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: mongo-init
          image: mongo:7.0
          command: ["sh", "-c", "cp /init-scripts/mongo-init.js /docker-entrypoint-initdb.d/"]
          volumeMounts:
            - name: init-scripts
              mountPath: /init-scripts
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: mongo-root-password
            - name: MONGO_INITDB_DATABASE
              value: "blackiefi"
          volumeMounts:
            - name: mongo-persistent
              mountPath: /data/db
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: init-scripts
          configMap:
            name: mongo-init-config
        - name: initdb
          emptyDir: {}
        - name: mongo-persistent
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: blackiefi
  labels:
    app.kubernetes.io/name: mongo
spec:
  clusterIP: None          # headless — pods resolve via mongo.blackiefi.svc.cluster.local
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
  selector:
    app: mongo
