# Optional Ingress resource if you run an Ingress Controller (nginx-ingress / traefik).
# If you prefer bare NodePort access at :30080, you can skip this file.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blackiefi-ingress
  namespace: blackiefi
  labels:
    app.kubernetes.io/part-of: blackiefi-platform
  annotations:
    # For nginx-ingress controller
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # For TLS via cert-manager (optional)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - blackiefi.local
  #     secretName: blackiefi-tls
  rules:
    - host: blackiefi.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 8080
