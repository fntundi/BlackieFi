apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: blackiefi
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ai
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 1
  strategy:
    type: Recreate          # Only one replica can own the model volume
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
    spec:
      # If your homelab node has a GPU, add:
      #   nodeSelector:
      #     gpu: "true"
      #   tolerations:
      #     - key: nvidia.com/gpu
      #       operator: Exists
      #       effect: NoSchedule
      initContainers:
        # Model pulling is handled by the ollama-model-pull Job below.
        # This init container is a no-op placeholder for documentation.
        - name: init-placeholder
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Ollama model pull delegated to Job'"]
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: ollama
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-persistent
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: ollama-persistent
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: blackiefi
  labels:
    app.kubernetes.io/name: ollama
spec:
  ports:
    - port: 11434
      targetPort: 11434
      name: ollama
  selector:
    app: ollama
---
# One-shot Job to pull the model after Ollama is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: blackiefi
  labels:
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Ollama deployment..."
              until curl -sf http://ollama.blackiefi.svc.cluster.local:11434/api/tags >/dev/null 2>&1; do
                echo "  ...not ready, retrying in 10s"
                sleep 10
              done
              if curl -s http://ollama.blackiefi.svc.cluster.local:11434/api/tags | grep -q '"phi"'; then
                echo "Model phi already present — nothing to do."
              else
                echo "Pulling phi model (this may take several minutes)..."
                curl -X POST http://ollama.blackiefi.svc.cluster.local:11434/api/pull -d '{"name":"phi"}'
              fi
              echo "Model pull complete."
