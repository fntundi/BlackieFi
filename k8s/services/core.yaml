# Core microservice — /api/health, /api/ai/*, /api/notifications/*, /api/currency/*, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: blackiefi
  labels: &core-labels
    app: core
    app.kubernetes.io/name: core
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels: *core-labels
    spec:
      containers:
        - name: core
          image: ${REGISTRY}/blackiefi-core:${IMAGE_TAG}
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: blackiefi-app-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: blackiefi
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: core
