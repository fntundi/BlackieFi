# Portfolio microservice — /api/accounts/*, /api/income/*, /api/expenses/*, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: blackiefi
  labels: &portfolio-labels
    app: portfolio
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels: *portfolio-labels
    spec:
      containers:
        - name: portfolio
          image: ${REGISTRY}/blackiefi-portfolio:${IMAGE_TAG}
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: blackiefi-app-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/accounts/health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/accounts/health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: blackiefi
spec:
  ports:
    - port: 8004
      targetPort: 8004
  selector:
    app: portfolio
