# Entity microservice — /api/entities/*
apiVersion: apps/v1
kind: Deployment
metadata:
  name: entity
  namespace: blackiefi
  labels: &entity-labels
    app: entity
    app.kubernetes.io/name: entity
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: entity
  template:
    metadata:
      labels: *entity-labels
    spec:
      containers:
        - name: entity
          image: ${REGISTRY}/blackiefi-entity:${IMAGE_TAG}
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: blackiefi-app-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/entities/health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/entities/health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: entity
  namespace: blackiefi
spec:
  ports:
    - port: 8003
      targetPort: 8003
  selector:
    app: entity
