# Auth microservice — /api/auth/*
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: blackiefi
  labels: &auth-labels
    app: auth
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: blackiefi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels: *auth-labels
    spec:
      containers:
        - name: auth
          image: ${REGISTRY}/blackiefi-auth:${IMAGE_TAG}
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: blackiefi-app-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: blackiefi
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: auth
