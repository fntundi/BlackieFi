# Define the backend API server so Nginx knows where to send API requests
upstream api_server {
    # 'api' is the service name from our docker-compose.yml file.
    # Docker's internal DNS resolves 'api' to the correct container's IP.
    server api:8080;
}

server {
    listen 80;
    server_name localhost;

    # Directory where our static frontend files live
    root /usr/share/nginx/html;
    index index.html;

    # All requests starting with /api/ are proxied to the backend Node.js server
    location /api/ {
        proxy_pass http://api_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # This 'try_files' directive is CRITICAL for Single-Page Applications (SPAs)
    # It ensures that any direct navigation to a client-side route (e.g., /dashboard)
    # is handled by React Router by serving the index.html file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}