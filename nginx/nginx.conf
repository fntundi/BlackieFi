# Define an 'upstream' for our backend API for easier reference and load balancing
upstream api_server {
    # 'api' is the service name we will use in docker-compose.yml
    # Docker's internal DNS will resolve 'api' to the container's IP address.
    server api:8080;
}

server {
    listen 80;
    server_name localhost;

    # Root directory for static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # Route all API calls to the backend API server
    location /api/ {
        # 'proxy_pass' sends the request to our defined upstream
        proxy_pass http://api_server/;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # For all other locations, serve the static files from the root.
    # This 'try_files' is critical for single-page applications (SPAs) like React.
    # It tries to find a file matching the URI, and if not found, falls back to index.html.
    # This allows React Router to handle the client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}