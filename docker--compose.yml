version: '3.8'

services:
  # The Backend API Service
  api:
    build:
      # Context is the project root, so the Dockerfile can access the whole monorepo
      context: .
      dockerfile: Dockerfile.api
    container_name: blackiefi_api
    restart: unless-stopped
    volumes:
      # Mount a named volume to persist the SQLite database
      - sqlite_data:/app/prisma
    env_file:
      - .env
    networks:
      - app-network

  # The Frontend / Web Proxy Service
  web:
    build:
      # Context is also the project root
      context: .
      dockerfile: Dockerfile.web
    container_name: blackiefi_web
    restart: unless-stopped
    ports:
      # Expose port 80 of the Nginx container to port 80 on your host machine
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

# Define a shared bridge network for the containers to communicate
networks:
  app-network:
    driver: bridge

# Define the named volume for persistent data
volumes:
  sqlite_data: