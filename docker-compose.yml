version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blackiefi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blackiefi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blackiefi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-blackiefi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blackiefi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackiefi-backend
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-blackiefi}:${POSTGRES_PASSWORD:-blackiefi_secret}@postgres:5432/${POSTGRES_DB:-blackiefi}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - PORT=8080
      - GIN_MODE=${GIN_MODE:-debug}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blackiefi-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackiefi-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blackiefi-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  blackiefi-network:
    driver: bridge
