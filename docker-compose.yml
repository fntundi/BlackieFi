# =============================================================================
# BlackieFi - Production-Ready Docker Compose
# =============================================================================
# This is the ONLY docker-compose you need for local development.
# 
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # View logs
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes
#
# Access:
#   Frontend: http://localhost:3000
#   Backend:  http://localhost:8001
#   API Docs: http://localhost:8001/docs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MongoDB - Database
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: blackiefi-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi

  # ---------------------------------------------------------------------------
  # Backend - FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackiefi-backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=blackiefi
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - METRICS_TOKEN=${METRICS_TOKEN}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - UPLOAD_MAX_MB=${UPLOAD_MAX_MB}
      - ENVIRONMENT=${ENVIRONMENT}

      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY:-}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SEED_DEMO_USERS=${SEED_DEMO_USERS}

    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      # Mount source for hot reload during development
      - ./backend:/app
    networks:
      - blackiefi
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend - React
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackiefi-frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      # Enable polling for file changes in Docker/WSL
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      # Mount source for hot reload during development
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - blackiefi
    restart: unless-stopped

networks:
  blackiefi:
    driver: bridge

volumes:
  mongo_data:
