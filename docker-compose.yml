# BlackieFi 3.0 - Docker Compose Configuration
# Production-grade microservices architecture

version: '3.8'

services:
  # ===========================================
  # Data Layer
  # ===========================================
  
  mongo:
    image: mongo:7.0
    container_name: blackiefi-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-blackiefi_admin_2024}
      MONGO_INITDB_DATABASE: blackiefi
    volumes:
      - ./data/mongo:/data/db
      - ./infrastructure/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blackiefi-network

  redis:
    image: redis:7-alpine
    container_name: blackiefi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi-network

  chroma:
    image: chromadb/chroma:latest
    container_name: blackiefi-chroma
    restart: unless-stopped
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    volumes:
      - ./data/chroma:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi-network

  # ===========================================
  # AI Layer
  # ===========================================
  
  ollama:
    image: ollama/ollama:latest
    container_name: blackiefi-ollama
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 40s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - blackiefi-network

  ollama-init:
    image: curlimages/curl:latest
    container_name: blackiefi-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking for phi model..."
        if curl -s http://ollama:11434/api/tags | grep -q '"phi"'; then
          echo "Model phi already exists"
        else
          echo "Pulling phi model (this may take a few minutes)..."
          curl -X POST http://ollama:11434/api/pull -d '{"name":"phi"}' || echo "Model pull initiated"
        fi
        echo "Ollama initialization complete!"
    networks:
      - blackiefi-network

  # ===========================================
  # Backend Services
  # ===========================================
  
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: blackiefi-auth
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-blackiefi}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/health"]
      interval: 40s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: blackiefi-core
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-blackiefi}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 40s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

  entity:
    build:
      context: .
      dockerfile: services/entity/Dockerfile
    container_name: blackiefi-entity
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-blackiefi}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/entities/health"]
      interval: 10s
      timeout: 40s
      retries: 20
    networks:
      - blackiefi-network

  portfolio:
    build:
      context: .
      dockerfile: services/portfolio/Dockerfile
    container_name: blackiefi-portfolio
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-blackiefi}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/accounts/health"]
      interval: 40s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

  assets:
    build:
      context: .
      dockerfile: services/assets/Dockerfile
    container_name: blackiefi-assets
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-blackiefi}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/assets/health"]
      interval: 40s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

  # ===========================================
  # Gateway App Layer
  # ===========================================
  
  gateway-app:
    build:
      context: .
      dockerfile: services/gateway-app/Dockerfile
    container_name: blackiefi-gateway-app
    restart: unless-stopped
    environment:
      - GATEWAY_APP_PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - AUTH_SERVICE_URL=http://auth:8001
      - CORE_SERVICE_URL=http://core:8002
      - ENTITY_SERVICE_URL=http://entity:8003
      - PORTFOLIO_SERVICE_URL=http://portfolio:8004
      - ASSETS_SERVICE_URL=http://assets:8005
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      auth:
        condition: service_healthy
      core:
        condition: service_healthy
      entity:
        condition: service_healthy
      portfolio:
        condition: service_healthy
      assets:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 40s
      timeout: 10s
      retries: 10
    networks:
      - blackiefi-network

  # ===========================================
  # API Gateway Edge Layer
  # ===========================================
  
  nginx:
    image: nginx:alpine
    container_name: blackiefi-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      gateway-app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 50s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

  # ===========================================
  # Frontend
  # ===========================================
  
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.docker
    container_name: blackiefi-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8080
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 40s
      timeout: 10s
      retries: 20
    networks:
      - blackiefi-network

networks:
  blackiefi-network:
    driver: bridge
    name: blackiefi-network
