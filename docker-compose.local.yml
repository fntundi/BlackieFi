# BlackieFi 3.0 - Local Development with Docker (WSL)
# ====================================================
# Simplified docker-compose for local development
# Run: docker compose -f docker-compose.local.yml up -d

version: '3.8'

services:
  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================
  
  mongodb:
    image: mongo:7.0
    container_name: blackiefi-mongodb
    environment:
      MONGO_INITDB_DATABASE: blackiefi
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: blackiefi-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi-network
    restart: unless-stopped

  # =============================================================================
  # BACKEND (Python/FastAPI)
  # =============================================================================
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: blackiefi-backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=blackiefi
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-blackiefi-super-secret-jwt-key-change-in-production}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY:-}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blackiefi-network
    restart: unless-stopped
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  # =============================================================================
  # FRONTEND (React)
  # =============================================================================
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: blackiefi-frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blackiefi-network
    restart: unless-stopped

  # =============================================================================
  # OBSERVABILITY (Optional - uncomment to enable)
  # =============================================================================
  
