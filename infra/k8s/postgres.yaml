apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blackiefi-postgres-data
  namespace: blackiefi
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: blackiefi-postgres
  namespace: blackiefi
spec:
  selector:
    app: blackiefi-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackiefi-postgres
  namespace: blackiefi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackiefi-postgres
  template:
    metadata:
      labels:
        app: blackiefi-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: blackiefi
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blackiefi-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: blackiefi-postgres-data
