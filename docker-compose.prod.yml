version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: blackiefi-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackiefi
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: blackiefi-backend
    environment:
      - MONGO_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/blackiefi?authSource=admin
      - DB_NAME=blackiefi
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - METRICS_TOKEN=${METRICS_TOKEN}
      - UPLOAD_MAX_MB=${UPLOAD_MAX_MB}
      - ENVIRONMENT=production
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - blackiefi
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
    container_name: blackiefi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - blackiefi
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: blackiefi-prometheus
    environment:
      - METRICS_TOKEN=${METRICS_TOKEN}
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: ["/bin/sh", "-c", "echo \"${METRICS_TOKEN}\" > /etc/prometheus/metrics_token && /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --storage.tsdb.retention.time=15d --web.enable-lifecycle"]
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - blackiefi
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    container_name: blackiefi-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - blackiefi
    restart: unless-stopped


networks:
  blackiefi:
    driver: bridge

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
